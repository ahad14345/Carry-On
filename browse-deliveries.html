<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Deliveries - CarryOn</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <script src="js/auth.js"></script>

    <div class="container">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 20px;
        "
      >
        <h1>Browse Delivery Requests</h1>
        <a href="traveler-dashboard.html" class="btn secondary">
          ← Back to Dashboard
        </a>
      </div>

      <p>Find packages matching your travel route.</p>

      <div class="filter-section">
        <div class="filter-card">
          <h3>Your Travel Route</h3>
          <p>
            <strong>From:</strong>
            <span id="travelerDeparture">-</span>
          </p>
          <p>
            <strong>To:</strong>
            <span id="travelerDestination">-</span>
          </p>
          <p>
            <strong>Travel Date:</strong>
            <span id="travelerDate">-</span>
          </p>
        </div>
      </div>

      <div style="margin-top: 20px">
        <h2>
          Matching Requests
          <span id="matchCount" style="font-size: 14px; color: #666">
            (0)
          </span>
        </h2>
      </div>

      <div id="deliveriesList"></div>
    </div>

    <script src="js/browse-deliveries.js"></script>
  </body>
</html>
