<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Deliveries - CarryOn</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <script src="js/auth.js"></script>

    <!-- Navbar -->
    <div class="navbar">
      <div class="logo">📦 CarryOn</div>
      <div class="nav-links">
        <a href="traveler-dashboard.html">Back to Dashboard</a>
        <button onclick="logout()" class="nav-btn">Logout</button>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
      <div class="hero-text">
        <h1>Browse Delivery Requests</h1>
        <p>Find packages matching your travel route and earn money</p>
      </div>
    </div>

    <!-- Main Content -->
    <div style="padding: 0 10%; margin-bottom: 80px">
      <!-- Your Route Filter Card -->
      <div
        class="filter-card"
        style="
          margin-bottom: 40px;
          background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
          color: white;
          padding: 30px;
          border-radius: 10px;
          box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        "
      >
        <h2 style="color: white; margin-bottom: 20px">✈️ Your Travel Route</h2>
        <div
          style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
          "
        >
          <div>
            <p
              style="
                margin: 0 0 8px 0;
                font-size: 12px;
                opacity: 0.9;
                text-transform: uppercase;
              "
            >
              From
            </p>
            <p
              style="margin: 0; font-size: 18px; font-weight: bold"
              id="travelerDeparture"
            >
              -
            </p>
          </div>
          <div>
            <p
              style="
                margin: 0 0 8px 0;
                font-size: 12px;
                opacity: 0.9;
                text-transform: uppercase;
              "
            >
              To
            </p>
            <p
              style="margin: 0; font-size: 18px; font-weight: bold"
              id="travelerDestination"
            >
              -
            </p>
          </div>
          <div>
            <p
              style="
                margin: 0 0 8px 0;
                font-size: 12px;
                opacity: 0.9;
                text-transform: uppercase;
              "
            >
              Travel Date
            </p>
            <p
              style="margin: 0; font-size: 18px; font-weight: bold"
              id="travelerDate"
            >
              -
            </p>
          </div>
        </div>
      </div>

      <!-- Matching Requests Header -->
      <h2 style="color: #2563eb; margin-bottom: 30px; font-size: 28px">
        📦 Matching Requests
        <span
          id="matchCount"
          style="font-size: 18px; color: #94a3b8; font-weight: normal"
        >
          (0)
        </span>
      </h2>

      <!-- Deliveries List -->
      <div id="deliveriesList"></div>
    </div>

    <script src="js/browse-deliveries.js"></script>
  </body>
</html>
