<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traveler Dashboard</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <script src="js/auth.js"></script>

    <div class="hero">
      <h1>Traveler Dashboard</h1>

      <p id="welcome"></p>

      <br />

      <a href="profile.html" class="btn primary"> My Profile </a>

      <br /><br />

      <a href="travel-schedule.html" class="btn primary">
        Post Travel Schedule
      </a>

      <br /><br />

      <a href="browse-deliveries.html" class="btn primary">
        Browse Deliveries
      </a>

      <br /><br />

      <h2>My Travel Schedules</h2>

      <div id="scheduleList"></div>

      <br />

      <button onclick="logout()" class="btn secondary">Logout</button>
    </div>

    <script>
      if (!loggedInUser) {
        window.location.href = "login.html";
      }

      if (loggedInUser.role !== "Traveler") {
        alert("Access Denied");
        window.location.href = "login.html";
      }

      document.getElementById("welcome").innerHTML =
        "Welcome, <b>" + loggedInUser.name + "</b>";
    </script>

    <script src="js/traveler-dashboard.js"></script>
  </body>
</html>
