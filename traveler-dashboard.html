<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traveler Dashboard</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <script src="js/auth.js"></script>

    <!-- Navbar -->
    <div class="navbar">
      <div class="logo">✈️ CarryOn</div>
      <div class="nav-links">
        <a href="profile.html">My Profile</a>
        <button onclick="logout()" class="nav-btn">Logout</button>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
      <div class="hero-text">
        <h1>Traveler Dashboard</h1>
        <p id="welcome"></p>
        <div class="hero-buttons">
          <a href="travel-schedule.html" class="btn primary">
            🗺️ Post Travel Schedule
          </a>
          <a href="browse-deliveries.html" class="btn primary">
            📦 Browse Deliveries
          </a>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div style="padding: 0 10%; margin-bottom: 80px">
      <h2 style="color: #2563eb; margin-bottom: 30px; font-size: 28px">
        � Your Accepted Deliveries
      </h2>
      <div id="acceptedDeliveriesList"></div>

      <h2
        style="
          color: #2563eb;
          margin-bottom: 30px;
          font-size: 28px;
          margin-top: 60px;
        "
      >
        �🗺️ My Travel Schedules
      </h2>
      <div id="scheduleList"></div>
    </div>

    <script>
      if (!loggedInUser) {
        window.location.href = "login.html";
      }

      if (loggedInUser.role !== "Traveler") {
        alert("Access Denied");
        window.location.href = "login.html";
      }

      document.getElementById("welcome").innerHTML =
        "Welcome, <b>" + loggedInUser.name + "</b>! Ready to travel and earn?";
    </script>

    <script src="js/traveler-dashboard.js"></script>
  </body>
</html>
