<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sender Dashboard - CarryOn</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <script src="js/auth.js"></script>

    <!-- Navbar -->
    <div class="navbar">
      <div class="logo">📦 CarryOn</div>
      <div class="nav-links">
        <a href="profile.html">My Profile</a>
        <button onclick="logout()" class="nav-btn">Logout</button>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
      <div class="hero-text">
        <h1>Sender Dashboard</h1>
        <p id="welcome"></p>

          <a href="delivery-request.html" class="btn primary">

    <div style="padding: 0 10%; margin-bottom: 80px">

      <h2 style="color: #2563eb; margin-bottom: 30px; font-size: 28px">
        🔔 Notifications
      </h2>
      <div id="notificationsList"></div>

      <h2
        style="
          color: #2563eb;
          margin-bottom: 30px;
          font-size: 28px;
          margin-top: 60px;

      <div id="requestsList"></div>

    <script src="js/sender-dashboard.js"></script>
