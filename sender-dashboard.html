<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sender Dashboard - CarryOn</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <script src="js/auth.js"></script>

    <!-- Navbar -->
    <div class="navbar">
      <div class="logo">📦 CarryOn</div>
      <div class="nav-links">
        <a href="profile.html">My Profile</a>
        <button onclick="logout()" class="nav-btn">Logout</button>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
      <div class="hero-text">
        <h1>Sender Dashboard</h1>
        <p id="welcome"></p>
        <div class="hero-buttons">
          <a href="delivery-request.html" class="btn primary">
            📦 Create Delivery Request
          </a>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div style="padding: 0 10%; margin-bottom: 80px">
      <!-- Notifications Section -->
      <h2 style="color: #2563eb; margin-bottom: 30px; font-size: 28px">
        🔔 Notifications
      </h2>
      <div id="notificationsList"></div>

      <!-- Match Travelers Section -->
      <h2
        style="
          color: #2563eb;
          margin-bottom: 30px;
          font-size: 28px;
          margin-top: 60px;
        "
      >
        🤝 Match Travelers
      </h2>
      <div id="matchTravelersSection"></div>

      <h2
        style="
          color: #2563eb;
          margin-bottom: 30px;
          font-size: 28px;
          margin-top: 60px;
        "
      >
        📋 Your Delivery Requests
      </h2>
      <div id="requestsList"></div>
    </div>

    <!-- Modal for Matching Travelers -->
    <div id="matchModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1000; align-items: center; justify-content: center;">
      <div style="background: white; padding: 30px; border-radius: 10px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="margin: 0; color: #2563eb;">🤝 Available Travelers</h2>
          <button onclick="closeMatchModal()" style="background: none; border: none; font-size: 24px; cursor: pointer;">✕</button>
        </div>
        <p id="matchModalDeliveryInfo" style="margin-bottom: 20px; color: #666;"></p>
        <div id="matchModalTravelersList"></div>
      </div>
    </div>

    <script src="js/sender-dashboard.js"></script>
  </body>
</html>
